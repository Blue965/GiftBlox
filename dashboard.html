<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - GiftBlox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {}
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="translations.js"></script>
    <script src="settings.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-gradient {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-gray-900/90 backdrop-blur-md border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <i class="fas fa-gift text-purple-500 text-2xl mr-2"></i>
                    <span class="text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">GiftBlox</span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center">
                        <img id="userAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar" class="w-8 h-8 rounded-full mr-2">
                        <span id="userName" class="text-gray-300">Utilisateur</span>
                    </div>
                    <button onclick="logout()" class="text-gray-300 hover:text-white transition">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="pt-20 pb-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Welcome Section -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold mb-2">Bienvenue, <span id="welcomeUserName">Utilisateur</span> !</h1>
                <p class="text-gray-400">Voici votre tableau de bord GiftBlox</p>
            </div>

            <!-- Stats Cards -->
            <div class="grid md:grid-cols-4 gap-6 mb-8">
                <div class="card-gradient rounded-xl p-6 border border-gray-800">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-purple-500/20 rounded-lg flex items-center justify-center">
                            <i class="fas fa-coins text-purple-400 text-xl"></i>
                        </div>
                    </div>
                    <div class="text-3xl font-bold mb-1" id="userPoints">-</div>
                    <div class="text-gray-400 text-sm">Points</div>
                </div>
                
                <div class="card-gradient rounded-xl p-6 border border-gray-800">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-pink-500/20 rounded-lg flex items-center justify-center">
                            <i class="fas fa-level-up-alt text-pink-400 text-xl"></i>
                        </div>
                    </div>
                    <div class="text-3xl font-bold mb-1" id="userLevel">-</div>
                    <div class="text-gray-400 text-sm">Niveau</div>
                </div>
                
                <div class="card-gradient rounded-xl p-6 border border-gray-800">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-blue-500/20 rounded-lg flex items-center justify-center">
                            <i class="fas fa-tasks text-blue-400 text-xl"></i>
                        </div>
                    </div>
                    <div class="text-3xl font-bold mb-1" id="userTasks">-</div>
                    <div class="text-gray-400 text-sm">Tâches Complétées</div>
                </div>
                
                <div class="card-gradient rounded-xl p-6 border border-gray-800">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-green-500/20 rounded-lg flex items-center justify-center">
                            <i class="fas fa-star text-green-400 text-xl"></i>
                        </div>
                    </div>
                    <div class="text-3xl font-bold mb-1" id="userXP">-</div>
                    <div class="text-gray-400 text-sm">XP</div>
                </div>
            </div>

            <!-- Main Content Grid -->
            <div class="grid lg:grid-cols-3 gap-8">
                <!-- Available Tasks -->
                <div class="lg:col-span-2">
                    <div class="card-gradient rounded-xl p-6 border border-gray-800">
                        <h2 class="text-xl font-bold mb-6">Tâches Disponibles</h2>
                        <div id="tasksList" class="space-y-4">
                            <!-- Tasks will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- User Profile -->
                <div>
                    <div class="card-gradient rounded-xl p-6 border border-gray-800 mb-6">
                        <h2 class="text-xl font-bold mb-6">Votre Profil</h2>
                        <div class="text-center mb-6">
                            <img id="profileAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar" class="w-24 h-24 rounded-full mx-auto mb-4">
                            <h3 id="profileName" class="text-xl font-bold">Utilisateur</h3>
                            <p class="text-gray-400 text-sm">Membre depuis aujourd'hui</p>
                        </div>
                        <div class="space-y-3">
                            <div class="flex justify-between items-center">
                                <span class="text-gray-400">Progression du niveau</span>
                                <span class="text-purple-400">0%</span>
                            </div>
                            <div class="w-full bg-gray-700 rounded-full h-2">
                                <div class="bg-purple-500 h-2 rounded-full" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Quick Actions -->
                    <div class="card-gradient rounded-xl p-6 border border-gray-800">
                        <h2 class="text-xl font-bold mb-6">Actions Rapides</h2>
                        <div class="space-y-3">
                            <button onclick="window.location.href='boutique.html'" class="w-full discord-btn text-white px-4 py-3 rounded-lg font-medium text-left">
                                <i class="fas fa-store mr-2"></i>Voir la Boutique
                            </button>
                            <button onclick="window.location.href='historique.html'" class="w-full bg-gray-700 hover:bg-gray-600 text-white px-4 py-3 rounded-lg font-medium text-left transition">
                                <i class="fas fa-history mr-2"></i>Historique
                            </button>
                            <button onclick="window.location.href='parametres.html'" class="w-full bg-gray-700 hover:bg-gray-600 text-white px-4 py-3 rounded-lg font-medium text-left transition">
                                <i class="fas fa-cog mr-2"></i>Paramètres
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Vérifier si l'utilisateur est connecté
        function checkAuth() {
            const token = localStorage.getItem('discord_token');
            const user = localStorage.getItem('discord_user');
            
            if (!token || !user) {
                window.location.href = 'index.html';
                return false;
            }
            
            const userData = JSON.parse(user);
            updateUI(userData);
            return true;
        }

        // Mettre à jour l'interface avec les données utilisateur
        function updateUI(user) {
            // Discord API returns avatar as a hash, need to construct the URL
            const avatarUrl = user.avatar 
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                : `https://cdn.discordapp.com/embed/avatars/${user.discriminator % 5}.png`;
            
            document.getElementById('userAvatar').src = avatarUrl;
            document.getElementById('userName').textContent = user.username;
            document.getElementById('welcomeUserName').textContent = user.username;
            document.getElementById('profileAvatar').src = avatarUrl;
            document.getElementById('profileName').textContent = user.username;
        }

        // Déconnexion
        function logout() {
            localStorage.removeItem('discord_token');
            localStorage.removeItem('discord_user');
            window.location.href = 'index.html';
        }

        // Charger les tâches disponibles
        function loadTasks() {
            // Tâches fictives pour la démonstration
            const tasks = [
                {
                    id: 1,
                    name: 'Suivre sur TikTok',
                    description: 'Suivez notre compte TikTok',
                    reward: 50,
                    type: 'social',
                    link: 'https://www.tiktok.com/@realblue_1',
                    requiresProof: true
                },
                {
                    id: 2,
                    name: 'Inviter des amis',
                    description: 'Invitez 3 amis sur le serveur',
                    reward: 100,
                    type: 'invitation',
                    requiresProof: false
                },
                {
                    id: 3,
                    name: 'Message quotidien',
                    description: 'Envoyez 50 messages aujourd\'hui',
                    reward: 25,
                    type: 'activity',
                    requiresProof: false
                }
            ];

            const tasksList = document.getElementById('tasksList');
            tasksList.innerHTML = tasks.map(task => `
                <div class="bg-gray-800 rounded-lg p-4 border border-gray-700 hover:border-purple-500 transition">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="w-10 h-10 bg-purple-500/20 rounded-lg flex items-center justify-center mr-4">
                                <i class="fas fa-${task.type === 'social' ? 'share-alt' : task.type === 'invitation' ? 'user-plus' : 'comment'} text-purple-400"></i>
                            </div>
                            <div>
                                <h4 class="font-semibold">${task.name}</h4>
                                <p class="text-gray-400 text-sm">${task.description}</p>
                                ${task.link ? `<a href="${task.link}" target="_blank" class="text-purple-400 text-xs hover:underline mt-1 block">🔗 ${task.link}</a>` : ''}
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-purple-400 font-bold">+${task.reward}</div>
                            <div class="text-gray-400 text-sm">points</div>
                        </div>
                    </div>
                    ${task.requiresProof ? `
                        <div class="mt-3 space-y-2">
                            <input type="text" id="proof_${task.id}" placeholder="URL de la preuve (screenshot)" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-400 focus:outline-none focus:border-purple-500">
                            <button onclick="completeTaskWithProof(${task.id})" class="w-full discord-btn text-white px-4 py-2 rounded-lg font-medium text-sm">
                                <i class="fas fa-check mr-2"></i>Compléter avec preuve
                            </button>
                        </div>
                    ` : `
                        <button onclick="completeTask(${task.id})" class="w-full mt-3 discord-btn text-white px-4 py-2 rounded-lg font-medium text-sm">
                            Compléter cette tâche
                        </button>
                    `}
                </div>
            `).join('');
        }

        // Compléter une tâche avec preuve
        function completeTaskWithProof(taskId) {
            const proofInput = document.getElementById(`proof_${taskId}`);
            const proofUrl = proofInput.value.trim();
            
            if (!proofUrl) {
                alert('Veuillez fournir une preuve (URL de screenshot)');
                return;
            }
            
            // Simuler la soumission
            alert(`Tâche soumise avec preuve : ${proofUrl}\n\nLe staff validera votre demande.`);
        }

        // Compléter une tâche sans preuve
        function completeTask(taskId) {
            alert(`Tâche ${taskId} complétée !\n\nLe système vérifiera automatiquement votre progression.`);
        }

        // Charger les statistiques utilisateur depuis l'API du bot
        async function loadUserStats() {
            try {
                const user = JSON.parse(localStorage.getItem('discord_user'));
                if (!user || !user.id) {
                    console.error('Utilisateur non connecté');
                    return;
                }

                // Appeler l'API du bot
                const response = await fetch(`http://localhost:3001/api/user/${user.id}`);
                const result = await response.json();

                if (result.success && result.data) {
                    document.getElementById('userPoints').textContent = result.data.points;
                    document.getElementById('userLevel').textContent = result.data.level;
                    document.getElementById('userTasks').textContent = result.data.tasksCompleted;
                    document.getElementById('userXP').textContent = result.data.xp;
                } else {
                    console.error('Erreur lors de la récupération des données:', result.error);
                    // Afficher des tirets en cas d'erreur
                    document.getElementById('userPoints').textContent = '-';
                    document.getElementById('userLevel').textContent = '-';
                    document.getElementById('userTasks').textContent = '-';
                    document.getElementById('userXP').textContent = '-';
                }
            } catch (error) {
                console.error('Erreur lors du chargement des statistiques:', error);
                // Afficher des tirets en cas d'erreur
                document.getElementById('userPoints').textContent = '-';
                document.getElementById('userLevel').textContent = '-';
                document.getElementById('userTasks').textContent = '-';
                document.getElementById('userXP').textContent = '-';
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                loadTasks();
                loadUserStats();
            }
        });
    </script>
</body>
</html>
