<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Authentification | GiftBlox</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
*{font-family:Rajdhani,sans-serif}h1{font-family:Orbitron,sans-serif}body{background:#030303;color:#fff;overflow:hidden}
.spinner{position:relative;width:80px;height:80px;margin:20px auto}.spinner::before,.spinner::after{content:'';position:absolute;border-radius:50%;border:4px solid transparent}.spinner::before{inset:0;border-top-color:#8b5cf6;animation:spin 1s linear infinite}.spinner::after{inset:10px;border-bottom-color:#ec4899;animation:spin 2s linear reverse infinite}@keyframes spin{to{transform:rotate(360deg)}}
.bar{width:200px;height:4px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden;margin:20px auto}.fill{width:0%;height:100%;background:linear-gradient(90deg,#8b5cf6,#ec4899);transition:width .5s}
</style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:radial-gradient(circle at center,rgba(139,92,246,.15) 0,#030303 70%)">
<div class="text-center p-8 rounded-[2.5rem] border border-white/5 bg-white/2" style="backdrop-filter:blur(20px)">
  <div class="spinner"></div>
  <h1 class="text-xl font-black mb-2">Initialisation <span class="text-purple-500">...</span></h1>
  <p id="status" class="text-gray-500 font-bold text-xs uppercase tracking-widest mb-3">Liaison avec Discord</p>
  <div class="bar"><div id="progress" class="fill"></div></div>
</div>

<script>
const statusText = document.getElementById('status');
const progress = document.getElementById('progress');
function setStatus(s,p){ statusText.textContent = s; progress.style.width = p + '%'; }

const fragment = new URLSearchParams(window.location.hash.slice(1));
const accessToken = fragment.get('access_token');
const error = new URLSearchParams(window.location.search).get('error') || fragment.get('error');

if (error) {
  setStatus('Échec', 100);
  setTimeout(() => { window.location.href = 'index.html'; }, 1000);
} else if (accessToken) {
  setStatus('Récupération du profile', 40);
  fetch('https://discord.com/api/users/@me', { headers: { Authorization: 'Bearer '+accessToken } })
  .then(r => r.json())
  .then(userData => {
    setStatus('Synchronisation', 70);
    localStorage.setItem('discord_token', accessToken);
    localStorage.setItem('discord_user', JSON.stringify(userData));
    setStatus('Accès validé', 100);
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
  })
  .catch(() => { window.location.href = 'index.html?error=fetch'; });
} else {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
