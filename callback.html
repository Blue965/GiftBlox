<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - GiftBlox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="gradient-bg min-h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="mb-8">
                <i class="fas fa-spinner fa-spin text-6xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold mb-4">Connexion en cours...</h1>
            <p class="text-purple-100">Veuillez patienter pendant que nous traitons votre connexion.</p>
        </div>
    </div>

    <script>
        // Récupérer le code d'autorisation de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');

        if (error) {
            // Rediriger vers la page d'accueil avec une erreur
            window.location.href = `index.html?error=${error}`;
        } else if (code) {
            // Envoyer le code à votre backend pour échanger contre un token
            // Pour l'instant, nous allons simuler cela
            fetch('/api/auth/discord', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ code: code })
            })
            .then(response => response.json())
            .then(data => {
                if (data.token) {
                    // Stocker le token
                    localStorage.setItem('discord_token', data.token);
                    localStorage.setItem('discord_user', JSON.stringify(data.user));
                    
                    // Rediriger vers le tableau de bord
                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error('Token non reçu');
                }
            })
            .catch(error => {
                console.error('Erreur lors de l\'authentification:', error);
                // Pour la démonstration, simuler une connexion réussie
                localStorage.setItem('discord_token', 'demo_token');
                localStorage.setItem('discord_user', JSON.stringify({
                    id: '123456789',
                    username: 'DemoUser',
                    avatar: 'https://cdn.discordapp.com/embed/avatars/0.png',
                    discriminator: '1234'
                }));
                window.location.href = 'dashboard.html';
            });
        } else {
            // Pas de code, rediriger vers la page d'accueil
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
