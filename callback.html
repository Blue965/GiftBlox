<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - GiftBlox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <div class="gradient-bg min-h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="mb-8">
                <i class="fas fa-spinner fa-spin text-6xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold mb-4">Connexion en cours...</h1>
            <p class="text-purple-100">Veuillez patienter pendant que nous traitons votre connexion.</p>
        </div>
    </div>

    <script>
        // 1. On extrait les paramètres après le "#" (jeton Discord) ou le "?" (erreurs)
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        const urlParams = new URLSearchParams(window.location.search);
        
        const accessToken = fragment.get('access_token');
        const error = urlParams.get('error') || fragment.get('error');

        if (error) {
            // En cas de refus de l'utilisateur, retour à l'accueil avec l'erreur
            window.location.href = `index.html?error=${error}`;
        } else if (accessToken) {
            // 2. On récupère directement les vraies infos du profil utilisateur via l'API Discord
            fetch('https://discord.com/api/users/@me', {
                headers: {
                    'Authorization': `Bearer ${accessToken}` 
                }
            })
            .then(response => {
                if (!response.ok) throw new Error('Impossible de charger le profil Discord');
                return response.json();
            })
            .then(userData => {
                // 3. On sauvegarde le jeton et les vraies données de l'utilisateur en local
                localStorage.setItem('discord_token', accessToken);
                localStorage.setItem('discord_user', JSON.stringify(userData));
                
                // 4. Redirection vers votre tableau de bord fonctionnel
                window.location.href = 'dashboard.html';
            })
            .catch(err => {
                console.error('Erreur d\'authentification:', err);
                window.location.href = 'index.html?error=fetch_failed';
            });
        } else {
            // Si aucun jeton n'est détecté, retour à l'accueil
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
